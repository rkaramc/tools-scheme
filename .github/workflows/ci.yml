name: CI/CD

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test - ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]

    steps:
      - uses: actions/checkout@v5

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24

      - name: Setup Just
        uses: Taiki-E/install-action@just

      - name: Install dependencies (Node)
        run: cd editors/vscode && npm ci

      - name: Build and Test LSP
        run: cd lsp && cargo test

      - name: Build and Test Extension
        run: cd editors/vscode && npm run compile && npm test

  release:
    name: Release Artifacts - ${{ matrix.os }}
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Just
        uses: Taiki-E/install-action@just

      - name: Build LSP Release
        run: just build 2

      - name: Package Binary
        shell: bash
        run: |
          mkdir -p dist
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            cp lsp/target/release/scheme-toolbox-lsp.exe dist/scheme-toolbox-lsp-windows.exe
          elif [ "${{ matrix.os }}" = "macos-latest" ]; then
            cp lsp/target/release/scheme-toolbox-lsp dist/scheme-toolbox-lsp-macos
          else
            cp lsp/target/release/scheme-toolbox-lsp dist/scheme-toolbox-lsp-linux
          fi

      - name: Upload Binary
        uses: actions/upload-artifact@v4
        with:
          name: scheme-toolbox-lsp-${{ matrix.os }}
          path: dist/

      - name: Build Extension VSIX (Ubuntu only)
        if: matrix.os == 'ubuntu-latest'
        run: |
          npm install -g @vscode/vsce
          cd editors/vscode && npm ci && vsce package --out ../../tools-scheme.vsix

      - name: Upload VSIX (Ubuntu only)
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: vscode-extension
          path: tools-scheme.vsix
