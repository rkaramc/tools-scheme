name: CI/CD

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Test - ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]
    
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Just
        uses: Taiki-E/install-action@just

      - name: Install dependencies (Node)
        run: cd editors/vscode && npm ci

      - name: Build and Test LSP
        run: cd lsp && cargo test

      - name: Build and Test Extension
        run: cd editors/vscode && npm run compile && npm test

  release:
    name: Release Artifacts
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Just
        uses: Taiki-E/install-action@just

      - name: Install vsce
        run: npm install -g @vscode/vsce

      - name: Build Extension VSIX
        run: cd editors/vscode && npm ci && vsce package --out ../../tools-scheme.vsix

      - name: Upload VSIX
        uses: actions/upload-artifact@v4
        with:
          name: vscode-extension
          path: tools-scheme.vsix

      # Note: We are not bundling binaries, so the CD pipeline for the LSP 
      # would typically involve 'cargo publish'. 
      # Binary artifacts for different OSs could be uploaded here if desired.
